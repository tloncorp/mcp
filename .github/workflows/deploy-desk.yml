name: Deploy to distribution ship
on:
  push:
    branches:
      - main

env:
  DESK:      mcp
  TMUX_TAB:  sponsor
  SHIP_HOST: root@143.198.70.9
  PIER_PATH: /root/.local/share/groundwire-alpha
  DIST_PIER: watwyd-bannyt-parmep-sivpes--motweb-dovfet-nilrec-daplyd

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        run: |
          curl -LO "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz"
          tar xf zig-x86_64-linux-0.15.2.tar.xz
          ZIG_DIR=zig-x86_64-linux-0.15.2
          echo "$(pwd)/$ZIG_DIR" >> $GITHUB_PATH

      - name: Build desk
        run: zig build

      - name: Create desk.ship
        run: |
          printf '%s\n' "~${DIST_PIER}" > dist/desk.ship

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 143.198.70.9 >> ~/.ssh/known_hosts

      - name: Clear deployed desk
        run: ssh ${SHIP_HOST} "find ${PIER_PATH}/${DIST_PIER}/${DESK} -mindepth 1 -maxdepth 1 -exec rm -rf {} +"

      - name: Deploy desk
        run: |
          rsync -az --delete --exclude='.git*' \
            dist/ ${SHIP_HOST}:${PIER_PATH}/${DIST_PIER}/${DESK}/

      - name: Commit desk on ship
        run: |
          ssh ${SHIP_HOST} "tmux send-keys -t ${TMUX_TAB} '|commit %${DESK}' Enter"
