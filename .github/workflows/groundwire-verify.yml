name: Groundwire PR Verification

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

env:
  # The CI's own Groundwire ship HTTP endpoint (repo secret)
  GROUNDWIRE_ENDPOINT: ${{ secrets.GROUNDWIRE_ENDPOINT }}
  # Auth cookie for the CI's Groundwire ship (repo secret)
  GROUNDWIRE_AUTH: ${{ secrets.GROUNDWIRE_AUTH }}

jobs:
  verify-groundwire-id:
    name: Verify Groundwire ID
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR commits
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Extract and verify commit signatures
        id: verify
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          COMMITS=$(git rev-list "${BASE_SHA}..${HEAD_SHA}")
          COMMIT_COUNT=$(echo "$COMMITS" | wc -l)

          echo "Verifying ${COMMIT_COUNT} commit(s) in ${BASE_SHA:0:8}..${HEAD_SHA:0:8}"

          VERIFIED="true"
          RESULTS=""

          for COMMIT in $COMMITS; do
            SHORT="${COMMIT:0:8}"
            RAW=$(git cat-file commit "$COMMIT")

            # --- Check for gpgsig header ---
            if ! echo "$RAW" | grep -q '^gpgsig '; then
              echo "::error::Commit ${SHORT} is not signed."
              RESULTS="${RESULTS}UNSIGNED ${SHORT}\n"
              VERIFIED="false"
              continue
            fi

            # --- Extract the signature block ---
            SIG_BLOCK=$(echo "$RAW" | sed -n '/^gpgsig /{s/^gpgsig //; p; :a; n; /^ /{ s/^ //; p; ba; }; q}')

            # --- Check for Groundwire signature format ---
            if ! echo "$SIG_BLOCK" | grep -q 'BEGIN GROUNDWIRE SIGNATURE'; then
              echo "::error::Commit ${SHORT}: not a Groundwire signature."
              RESULTS="${RESULTS}NOT_GROUNDWIRE ${SHORT}\n"
              VERIFIED="false"
              continue
            fi

            # --- Parse structured signature ---
            SIGNER=$(echo "$SIG_BLOCK" | grep '^signer:' | cut -d: -f2)
            SIGNATURE=$(echo "$SIG_BLOCK" | grep '^sig:' | cut -d: -f2)

            if [ -z "$SIGNER" ] || [ -z "$SIGNATURE" ]; then
              echo "::error::Commit ${SHORT}: malformed Groundwire signature."
              RESULTS="${RESULTS}MALFORMED ${SHORT}\n"
              VERIFIED="false"
              continue
            fi

            # --- Build the signed payload ---
            # Git signs the commit object with the gpgsig header stripped.
            PAYLOAD=$(echo "$RAW" | sed '/^gpgsig /,/^[^ ]/{/^gpgsig /d; /^ /d;}')

            echo "Commit ${SHORT}: signed by ${SIGNER}, verifying against on-chain key..."

            # --- Extract ecash fields if present ---
            ECASH_CIPHERTEXT=$(echo "$SIG_BLOCK" | grep '^ecash-ciphertext:' | cut -d: -f2)
            ECASH_EPH_PUBKEY=$(echo "$SIG_BLOCK" | grep '^ecash-ephemeral-pubkey:' | cut -d: -f2)
            ECASH_MAC=$(echo "$SIG_BLOCK" | grep '^ecash-mac:' | cut -d: -f2)
            ECASH_TOKENS=$(echo "$SIG_BLOCK" | grep '^ecash-tokens:' | cut -d: -f2-)
            ECASH_AMOUNT=$(echo "$SIG_BLOCK" | grep '^ecash-amount:' | cut -d: -f2)

            # --- Send to CI's Groundwire ship for full verification ---
            # The ship checks:
            #   1. Is the signer attested on-chain? (Jael deed lookup)
            #   2. Does the Ed25519 signature match the on-chain pass?
            #   3. If ecash tokens present, NUT-03 swap to verify value
            VERIFY_ARGS=(--arg signer "$SIGNER" --arg signature "$SIGNATURE" --arg payload "$PAYLOAD")
            VERIFY_EXPR='{signer: $signer, signature: $signature, payload: $payload'

            if [ -n "$ECASH_CIPHERTEXT" ]; then
              VERIFY_ARGS+=(--arg ecash_ciphertext "$ECASH_CIPHERTEXT" --arg ecash_ephemeral_pubkey "$ECASH_EPH_PUBKEY" --arg ecash_mac "$ECASH_MAC")
              VERIFY_EXPR+=', ecash_ciphertext: $ecash_ciphertext, ecash_ephemeral_pubkey: $ecash_ephemeral_pubkey, ecash_mac: $ecash_mac'
            elif [ -n "$ECASH_TOKENS" ]; then
              VERIFY_ARGS+=(--argjson ecash_tokens "$ECASH_TOKENS")
              VERIFY_EXPR+=', ecash_tokens: $ecash_tokens'
            fi

            [ -n "$ECASH_AMOUNT" ] && { VERIFY_ARGS+=(--argjson ecash_amount "$ECASH_AMOUNT"); VERIFY_EXPR+=', ecash_amount: $ecash_amount'; }

            VERIFY_EXPR+='}'

            RESPONSE=$(curl -s -f \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Cookie: ${GROUNDWIRE_AUTH}" \
              "${GROUNDWIRE_ENDPOINT}/vitriol/verify-commit" \
              -d "$(jq -n "${VERIFY_ARGS[@]}" "$VERIFY_EXPR")") || {
              echo "::error::Commit ${SHORT}: failed to reach CI Groundwire ship"
              RESULTS="${RESULTS}UNREACHABLE ${SHORT}\n"
              VERIFIED="false"
              continue
            }

            # --- Parse verification response ---
            # If ecash tokens are present, verify-commit returns {status: "pending", verify_id: "..."}
            # and performs async NUT-03 swap. Poll verify-status until complete.
            VERIFY_STATUS=$(echo "$RESPONSE" | jq -r '.status // empty')
            if [ "$VERIFY_STATUS" = "pending" ]; then
              VERIFY_ID=$(echo "$RESPONSE" | jq -r '.verify_id // empty')
              echo "Commit ${SHORT}: ecash verification pending, polling..."
              for i in $(seq 1 60); do
                sleep 5
                POLL_RESPONSE=$(curl -s -f \
                  -H "Cookie: ${GROUNDWIRE_AUTH}" \
                  "${GROUNDWIRE_ENDPOINT}/vitriol/verify-status/${VERIFY_ID}") || {
                  echo "::error::Commit ${SHORT}: failed to poll verify-status"
                  break
                }
                POLL_STATUS=$(echo "$POLL_RESPONSE" | jq -r '.status // empty')
                if [ "$POLL_STATUS" != "pending" ]; then
                  RESPONSE="$POLL_RESPONSE"
                  break
                fi
                if [ "$i" = "60" ]; then
                  echo "::error::Commit ${SHORT}: ecash verification timed out after 5 minutes"
                  RESPONSE='{"verified":false,"error":"ecash verification timed out"}'
                  break
                fi
              done
            fi

            VALID=$(echo "$RESPONSE" | jq -r '.verified // false')

            if [ "$VALID" != "true" ]; then
              ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error // "unknown"')
              echo "::error::Commit ${SHORT}: ${SIGNER} verification failed (${ERROR_MSG})"
              if [ "$ERROR_MSG" = "signer not found in Jael" ] || [ "$ERROR_MSG" = "signer has no keys (life=0)" ]; then
                RESULTS="${RESULTS}NOT_ONCHAIN ${SHORT} ${SIGNER} ${ERROR_MSG}\n"
              else
                RESULTS="${RESULTS}FAILED ${SHORT} ${SIGNER} ${ERROR_MSG}\n"
              fi
              VERIFIED="false"
            else
              LIFE=$(echo "$RESPONSE" | jq -r '.life // "?"')
              echo "Commit ${SHORT}: ${SIGNER} verified on-chain (life=${LIFE})"
              RESULTS="${RESULTS}VERIFIED ${SHORT} ${SIGNER}\n"
            fi
          done

          echo "verified=${VERIFIED}" >> "$GITHUB_OUTPUT"
          echo -e "$RESULTS" > /tmp/verification-results.txt

      - name: Gate PR on verification
        if: steps.verify.outputs.verified != 'true'
        run: |
          if grep -Eq '^(UNSIGNED|NOT_GROUNDWIRE) ' /tmp/verification-results.txt; then
            echo "::error::This PR contains commits without Groundwire signatures."
          elif grep -Eq '^UNREACHABLE ' /tmp/verification-results.txt; then
            echo "::error::Groundwire verification could not complete because the CI verifier node was unreachable."
          else
            echo "::error::This PR contains commits that failed Groundwire verification."
          fi
          echo ""
          cat /tmp/verification-results.txt
          echo ""
          echo "This check must pass before the PR will be reviewed."
          exit 1

      - name: Comment on unverified PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = '';
            try {
              results = fs.readFileSync('/tmp/verification-results.txt', 'utf8').trim();
            } catch (_) {}

            const lines = results.split('\n').filter(Boolean);
            const hasNoGroundwireSignature = lines.some(line =>
              /^(UNSIGNED|NOT_GROUNDWIRE)\s/.test(line)
            );
            const hasNotOnchainSigner = lines.some(line =>
              /^NOT_ONCHAIN\s/.test(line)
            );
            const hasUnreachableVerifier = lines.some(line =>
              /^UNREACHABLE\s/.test(line)
            );

            const commentMarker = '<!-- groundwire-verification-comment -->';

            let failureMessage = 'This PR may not be reviewed because one or more commits failed [Groundwire](https://groundwire.io/) verification:'
            let why = [
              'This repository requires contributors to prove ownership of an onchain Groundwire ID. Commit signatures are cryptographically verified against the signer\'s onchain networking key.'
            ];
            let fixSteps = [
              '1. **Make sure Groundwire is running** at the URL Vitriol expects at `sign-endpoint` in `/<local repo>/.git/config`',
              '2. **Update the cookie** for `sign-token` in `/<local repo>/.git/config` ([instructions](https://docs.urbit.org/urbit-os/kernel/eyre/external-api-ref#authentication))',
              '3. **Re-sign your commits** — `git rebase --force-rebase --exec \'git commit --amend --no-edit -S\' HEAD~N`'
            ];

            if (hasNoGroundwireSignature) {
              failureMessage = 'This PR may not be reviewed because at least one commit has no [Groundwire](https://groundwire.io/) signature:';
              why = [
                'This repository requires contributors to prove ownership of an onchain Groundwire ID. Commit signatures are cryptographically verified against the signer\'s onchain networking key.'
              ];
              fixSteps = [
                '1. **Install Groundwire** at [groundwire.io](https://groundwire.io/)',
                '2. **Configure Vitriol** at `http://<your groundwire>/vitriol`',
                '3. **Re-sign your commits** — `git rebase --force-rebase --exec \'git commit --amend --no-edit -S\' HEAD~N`',
              ];
            } else if (hasUnreachableVerifier) {
              failureMessage = 'This PR may not be reviewed because CI could not reach the repository\'s [Groundwire](https://groundwire.io/) verifier node to verify the following commits:';
              why = [
                'The commits include Groundwire signatures, but the GitHub Action could not contact the verifier. This is a maintainer-side issue, not a contributor signing issue.'
              ];
              fixSteps = [
                '1. **Check that the repository verifier node is running** and reachable from GitHub Actions',
                '2. **Check the `GROUNDWIRE_ENDPOINT` repository secret** and make sure it points at the verifier\'s public HTTP endpoint',
                '3. **Check `GROUNDWIRE_AUTH`** if the verifier requires an Eyre auth cookie, or enable public verification for the CI endpoints',
                '4. **Re-run this check** after the verifier is reachable'
              ];
            } else if (hasNotOnchainSigner) {
              failureMessage = 'This PR may not be reviewed because at least one commit was signed by a Groundwire ID that is not onchain:';
              why = [
                'The commit includes a Groundwire signature, but the signer is not present in the verifier\'s state. The signer must have an onchain Groundwire identity with a current networking key before CI can verify the commit.'
              ];
              fixSteps = [
                '1. **Put the signing Groundwire ID onchain** — [Groundwire](https://groundwire.io/)',
                '2. **Wait** for the onchain identity to show up in your %urb-watcher state',
                '3. **Re-run this check**, or re-sign with an already-onchain Groundwire ID — `git rebase --force-rebase --exec \'git commit --amend --no-edit -S\' HEAD~N`'
              ];
            }

            const body = [
              commentMarker,
              '## Groundwire Verification Failed',
              '',
              failureMessage,
              '',
              '```',
              results,
              '```',
              ...why,
              '',
              '### How to fix this',
              ...fixSteps,
              '',
              '*This repository is protected by [Groundwire for GitHub](https://github.com/gwbtc/vitriol).*'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body?.includes(commentMarker) ||
              c.body?.includes('Groundwire Verification Failed') ||
              c.body?.includes('Groundwire Verification Passed')
            );

            if (existing && existing.body !== body) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment on verified PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const commentMarker = '<!-- groundwire-verification-comment -->';

            const body = [
              commentMarker,
              '## Groundwire Verification Passed',
              '',
              'All commits in this PR passed [Groundwire](https://groundwire.io/) verification. This PR is ready for review.',
              '',
              '*This repository is protected by [Groundwire for GitHub](https://github.com/gwbtc/vitriol).*'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body?.includes(commentMarker) ||
              c.body?.includes('Groundwire Verification Failed') ||
              c.body?.includes('Groundwire Verification Passed')
            );

            if (existing && existing.body !== body) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
